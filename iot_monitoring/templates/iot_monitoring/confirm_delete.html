{% extends 'iot_monitoring/base.html' %}
{% block content %}
<h1>Confirm Delete</h1>
<div class="card">
    <p>Are you sure you want to delete this record?</p>
    <p><strong>{{ object }}</strong></p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-delete">Yes, delete it</button>
        <a href="{% url back_url %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
